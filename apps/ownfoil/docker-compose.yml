services:
  ownfoil:
    image: 'a1ex4/ownfoil:latest'
    restart: unless-stopped
    volumes:
      - ${RUNTIPI_MEDIA_PATH:-/home/jianpedi/runtipi/runtipi}/media/data/games/Switch:/games:ro
      - ${APP_DATA_DIR}/data/config:/app/config
      - ${APP_DATA_DIR}/data/data:/app/data
    x-runtipi:
      is_main: true
      internal_port: 8465
x-runtipi:
  schema_version: 2
  overrides: []
